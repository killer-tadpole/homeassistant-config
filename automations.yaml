- id: '1767570686009'
  alias: Plants – Detect watering
  description: ''
  triggers:
  - entity_id:
    - sensor.ficus_soil_moisture
    - sensor.monstera_soil_moisture
    - sensor.coffee_plant_soil_moisture
    - sensor.calathea_soil_moisture
    trigger: state
  conditions:
  - condition: template
    value_template: '{{ from_val is not none and to_val is not none and to_val > from_val
      }}

      '
  - condition: template
    value_template: '{{ from_val >= min_from_value }}'
  - condition: template
    value_template: '{{ pct_increase is not none and pct_increase >= min_percent_increase
      }}

      '
  - condition: template
    value_template: '{{ to_val >= min_result_value }}'
  - condition: template
    value_template: "{% set lw = states(watered_helper) %} {% if lw in ['unknown','unavailable','none','']
      %}\n  true\n{% else %}\n  {{ (as_timestamp(now()) - as_timestamp(lw)) > (cooldown_hours
      * 3600) }}\n{% endif %}\n"
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ states(watered_helper) not in [''unknown'',''unavailable'']
          }}'
      sequence:
      - target:
          entity_id: '{{ watered_helper }}'
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        action: input_datetime.set_datetime
  mode: queued
  max: 10
  variables:
    plant_slug: '{{ trigger.entity_id.split(''.'')[1] | replace(''_soil_moisture'','''')
      }}

      '
    watered_helper: '{{ ''input_datetime.plant_water_date_'' ~ plant_slug }}

      '
    threshold_helper: '{{ ''input_number.plant_water_threshold_'' ~ plant_slug }}

      '
    min_percent_increase: '{{ states(threshold_helper) | float(default=20) }}

      '
    min_from_value: 10
    min_result_value: 20
    cooldown_hours: 6
    from_val: '{{ trigger.from_state.state | float(default=none) }}'
    to_val: '{{ trigger.to_state.state | float(default=none) }}'
    pct_increase: "{% if from_val is not none and from_val > 0 and to_val is not none
      %}\n  {{ ((to_val - from_val) / from_val) * 100 }}\n{% else %}\n  {{ none }}\n{%
      endif %}\n"

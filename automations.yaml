- id: '1617218996090'
  alias: Media - Quiet Time
  description: Set night mode in the living room
  trigger:
  - platform: time
    at: '22:00'
    id: QuietOn
  - platform: time
    at: 07:30
    id: QuietOff
  - platform: device
    device_id: 4b9ccb23f5edf30da746fb20e21a87af
    domain: media_player
    entity_id: media_player.lg_webos_tv_f539
    type: turned_on
    id: TvOn
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: QuietOn
      - condition: time
        weekday:
        - mon
        - tue
        - wed
        - thu
        - sun
      - condition: numeric_state
        entity_id: media_player.sonos_arc
        attribute: volume_level
        above: 0.2
      - condition: state
        entity_id: media_player.sonos_arc
        attribute: source
        state: TV
      sequence:
      - service: switch.turn_on
        data: {}
        target:
          entity_id:
          - switch.sonos_arc_night_sound
          - switch.sonos_arc_speech_enhancement
      - service: media_player.volume_set
        data:
          volume_level: 0.25
        target:
          entity_id: media_player.sonos_arc
    - conditions:
      - condition: trigger
        id: TvOn
      - condition: time
        weekday:
        - mon
        - tue
        - wed
        - thu
        - sun
        after: '22:00:00'
        before: 08:00:00
      - condition: numeric_state
        entity_id: media_player.sonos_arc
        attribute: volume_level
        above: 0.2
      - condition: state
        entity_id: media_player.sonos_arc
        attribute: source
        state: TV
      sequence:
      - service: switch.turn_on
        data: {}
        target:
          entity_id:
          - switch.sonos_arc_night_sound
          - switch.sonos_arc_speech_enhancement
      - service: media_player.volume_set
        data:
          volume_level: 0.25
        target:
          entity_id: media_player.sonos_arc
    - conditions:
      - condition: trigger
        id: QuietOff
      sequence:
      - service: switch.turn_off
        data: {}
        target:
          entity_id:
          - switch.sonos_arc_speech_enhancement
          - switch.sonos_arc_night_sound
  mode: single

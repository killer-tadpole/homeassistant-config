- id: '1626608954403'
  alias: Blinds - Sun Protection
  description: ''
  triggers:
  - entity_id: sun.sun
    attribute: azimuth
    above: 95
    id: Down
    trigger: numeric_state
  - entity_id: sensor.living_room_temperature
    above: 24
    id: Down
    trigger: numeric_state
  - entity_id:
    - sensor.inverter_45a_horsell_power
    above: 800
    for:
      hours: 0
      minutes: 5
      seconds: 0
      milliseconds: 0
    id: Down
    trigger: numeric_state
  - entity_id: sun.sun
    attribute: azimuth
    above: 240
    id: Up
    trigger: numeric_state
  - entity_id: sun.sun
    attribute: elevation
    below: 35
    id: Up
    trigger: numeric_state
  conditions:
  - condition: template
    value_template: "{{ state_attr('automation.living_room_blind_down', 'last_triggered')\n
      \  is not none and\n   state_attr('automation.living_room_blind_down', 'last_triggered').day\n
      \  != utcnow().day }}\n"
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: Down
      - condition: device
        type: is_not_open
        device_id: 0478ec94d38b5e8ec501b65aac1ba1b3
        entity_id: binary_sensor.bifold_door
        domain: binary_sensor
      - condition: numeric_state
        entity_id: sun.sun
        attribute: azimuth
        above: 90
        below: 250
      - condition: numeric_state
        entity_id: sun.sun
        attribute: elevation
        above: 30
      - condition: numeric_state
        entity_id: weather.45a_horsell_moor
        attribute: temperature
        above: 26
      sequence:
      - target:
          entity_id:
          - button.middle_my_position
          - button.wall_my_position
          - button.door_my_position
        action: button.press
    - conditions:
      - condition: trigger
        id: Up
      sequence:
      - target:
          entity_id: cover.living_room_blinds
        action: cover.open_cover
  mode: single
- id: '1633767378248'
  alias: Notify - Washing Machine
  description: ''
  triggers:
  - entity_id: sensor.washing_machine_state
    from: run
    to: standby
    for:
      hours: 0
      minutes: 2
      seconds: 0
    alias: Finished
    id: Finished
    trigger: state
  - alias: 'Off'
    entity_id:
    - sensor.washing_machine_state
    from:
    to: 'off'
    for:
      hours: 0
      minutes: 0
      seconds: 0
    id: 'Off'
    trigger: state
  conditions: []
  actions:
  - if:
    - condition: trigger
      id:
      - Finished
    then:
    - parallel:
      - data:
          message: Washing Machine Finished
        action: notify.living_room_tv
      - if:
        - condition: state
          entity_id: person.jelena
          state: home
        then:
        - data:
            title: Washing Machine
            message: Washing Machine Finished
            data:
              tag: washing
          action: notify.mobile_app_iphone_12pro_jelly
      - if:
        - condition: state
          entity_id: person.colin
          state: home
        then:
        - data:
            title: Washing Machine
            message: Cycle Finished
            data:
              tag: washing
          action: notify.mobile_app_colin_s_phone
    else:
    - parallel:
      - data:
          message: clear_notification
          data:
            tag: washing
        action: notify.mobile_app_iphone_12pro_jelly
      - data:
          message: clear_notification
          data:
            tag: washing
        action: notify.mobile_app_colin_s_phone
  mode: single

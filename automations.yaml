- id: '1667807981062'
  alias: Error - Heating
  description: When bedroom needs heat but boiler is off
  trigger:
  - platform: state
    entity_id: climate.bedroom_radiator
    from: 'off'
    to: heat
    for: 00:01:00
    id: NoHeat
  - platform: template
    value_template: "{{ state_attr('climate.bedroom_radiator', 'current_temperature')
      | float(0)\n   > (state_attr('climate.landing', 'temperature') | float(0) +
      1.5) }}\n"
    id: TooHot
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: NoHeat
      - condition: state
        entity_id: climate.landing
        state: 'off'
        for: 00:05:00
      sequence:
      - service: notify.mobile_app_colin_s_phone
        data:
          title: Heating Error
          message: Radiator calling for heat while boiler is off
    - conditions:
      - condition: trigger
        id: TooHot
      - condition: state
        entity_id: climate.bedroom_radiator
        state: heat
        for: 00:01:00
      sequence:
      - service: climate.turn_off
        target:
          entity_id: climate.bedroom_radiator
      - service: notify.mobile_app_colin_s_phone
        data:
          title: Heating Error
          message: Bedroom radiator overheated and was turned off
  mode: single
- id: '1668375702088'
  alias: Whole Home - Occupancy - Home
  triggers:
  - entity_id: binary_sensor.home_occupied
    to: 'on'
    for: 00:00:15
    trigger: state
  conditions:
  - condition: state
    entity_id: input_boolean.occupancy_motion_suppressed
    state:
    - 'off'
  actions:
  - action: timer.cancel
    target:
      entity_id: timer.home_empty_2h
  - action: notify.mobile_app_colin_s_phone
    data:
      title: Heating
      message: Home occupied, enabling heating.
      data:
        tag: occupancy-home
  - action: climate.set_preset_mode
    target:
      entity_id:
      - climate.tado_bathroom
      - climate.tado_bedroom
      - climate.tado_landing_2
      - climate.tado_office
      - climate.tado_spare_room
    data:
      preset_mode: home
  - action: climate.set_preset_mode
    target:
      entity_id:
      - climate.kitchen
      - climate.living_room
    data:
      preset_mode: none
  - if:
    - condition: sun
      after: sunset
    then:
    - action: light.turn_on
      target:
        entity_id: light.outdoor
      data:
        brightness_pct: 100
        kelvin: 3284
    - wait_for_trigger:
      - type: opened
        device_id: 723c00aa4e8d6bf68e026a11e42bccfc
        entity_id: 223eff2233ea9a8e88f9617006e76d3e
        domain: binary_sensor
        trigger: device
      timeout: 00:15:00
    - action: light.turn_off
      target:
        entity_id: light.outdoor
  - if:
    - condition: state
      entity_id: binary_sensor.hot_water_power
      state: 'off'
      for: '12:00:00'
    then:
    - action: tado.set_water_heater_timer
      target:
        entity_id: water_heater.hot_water
      data:
        time_period: 00:30:00
    - action: notify.mobile_app_colin_s_phone
      data:
        title: Hot Water
        message: Water heater has been off >12h. Boosting for 30m.
        data:
          tag: hot-water-boost
  mode: restart

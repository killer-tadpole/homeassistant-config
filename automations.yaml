- id: '1615836380534'
  alias: Blinds - Auto Up
  description: ''
  triggers:
  - type: motion
    device_id: f0a514931458385417ffa507ba113112
    entity_id: binary_sensor.hall_sensor_motion
    domain: binary_sensor
    for:
      hours: 0
      minutes: 0
      seconds: 2
      milliseconds: 0
    id: WakeUp
    trigger: device
  - at: 08:30:00
    id: Lazy
    trigger: time
  conditions:
  - condition: sun
    before: sunset
    after: sunrise
  - condition: template
    value_template: '{{ state_attr(''automation.living_room_blinds'',''last_triggered'').day
      != utcnow().day }}'
  - condition: or
    conditions:
    - condition: trigger
      id: Lazy
    - condition: state
      entity_id: input_boolean.blinds_override
      state: 'off'
  - condition: time
    after: 06:30:00
  actions:
  - action: input_boolean.turn_on
    metadata: {}
    target:
      entity_id: input_boolean.occupancy_motion_suppressed
    data: {}
  - parallel:
    - if:
      - condition: trigger
        id:
        - Lazy
      then:
      - target:
          entity_id:
          - automation.lights_kitchen_motion
          - automation.lights_living_room
        data:
          stop_actions: true
        action: automation.turn_off
    - data: {}
      target:
        entity_id: input_boolean.blinds_override
      action: input_boolean.turn_off
    - data: {}
      action: cover.open_cover
      target:
        entity_id:
        - cover.door
        - cover.kitchen
        - cover.middle
        - cover.wall
    - delay:
        hours: 0
        minutes: 0
        seconds: 15
        milliseconds: 0
    - target:
        entity_id:
        - automation.lights_kitchen_motion
        - automation.lights_living_room
      data: {}
      action: automation.turn_on
  - delay:
      hours: 0
      minutes: 0
      seconds: 30
      milliseconds: 0
  - action: input_boolean.turn_off
    metadata: {}
    target:
      entity_id: input_boolean.occupancy_motion_suppressed
    data: {}
  mode: single
- id: '1615838178552'
  alias: Blinds - Bifold Close
